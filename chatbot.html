<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview Chatbot</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="config.js"></script>
</head>
<body>
  <header class="header">
    <div class="banner">
      <div class="overlay">
        <h1>💬 AI Interview Chatbot</h1>
        <p>Ask anything about interviews and get helpful guidance!</p>
      </div>
    </div>
    <button id="themeToggle" class="theme-toggle">🌙</button>
  </header>

  <div class="chat-container">
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Ask an interview question..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
    <p style="text-align:center;font-size:0.8rem;color:#999;margin-top:8px;">
      Try: "Tell me about yourself" • "What are your weaknesses?" • "STAR method" • "Salary negotiation"
    </p>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
const API_KEY = CONFIG.GEMINI_API_KEY; // paste your key here

const SYSTEM_CONTEXT = `You are an expert interview coach helping students and job seekers prepare for interviews. 
Your role is to:
- Give specific, actionable advice on how to answer interview questions
- Use the STAR method for behavioral questions
- Keep responses concise, friendly, and practical
- Give example answer structures when relevant
- Focus on HR, Technical, Behavioral, DSA, and System Design interview topics
- If asked something unrelated to interviews, politely redirect to interview prep
Keep responses under 200 words.`;

let conversationHistory = [];

window.onload = () => {
  appendMessage('bot', "👋 Hi! I'm your AI Interview Coach powered by Gemini.\n\nAsk me anything about interviews:\n• How to answer 'Tell me about yourself'\n• STAR method explanation\n• Salary negotiation tips\n• Technical interview prep\n• Resume advice");
};

async function sendMessage() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg) return;

  appendMessage('user', msg);
  input.value = '';

  // Add to conversation history for context
  conversationHistory.push({ role: 'user', parts: [{ text: msg }] });

  const typingEl = showTyping();

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_CONTEXT }] },
          contents: conversationHistory
        })
      }
    );

    const data = await response.json();

    if (!response.ok) {
  throw new Error(`${response.status}`);
}

    if (data.candidates && data.candidates[0]) {
      const reply = data.candidates[0].content.parts[0].text;
      conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
      removeTyping(typingEl);
      appendMessage('bot', reply);
    } else {
      throw new Error('No response from API');
    }

 } catch (error) {
  removeTyping(typingEl);
  if (error.message.includes('429')) {
    appendMessage('bot', '⏳ Too many requests — please wait a moment and try again.');
  } else {
    appendMessage('bot', '⚠️ Something went wrong. Please try again.');
  }
  console.error(error);
}
}

function appendMessage(sender, text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${sender}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${sender}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.whiteSpace = 'pre-line';
  bubble.textContent = text;
  if (sender === 'user') {
    msgDiv.appendChild(bubble);
    msgDiv.appendChild(avatar);
  } else {
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
  }
  chatBox.appendChild(msgDiv);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message bot';
  msgDiv.id = 'typingIndicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing-indicator';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  msgDiv.appendChild(avatar);
  msgDiv.appendChild(bubble);
  chatBox.appendChild(msgDiv);
  chatBox.scrollTop = chatBox.scrollHeight;
  return msgDiv;
}

function removeTyping(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

// Dark mode
const themeToggle = document.getElementById('themeToggle');
if (localStorage.getItem('darkMode') === 'true') {
  document.body.classList.add('dark-mode');
  themeToggle.textContent = '☀️';
}
themeToggle.onclick = () => {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('darkMode', isDark);
  themeToggle.textContent = isDark ? '☀️' : '🌙';
};
  </script>
</body>
</html>
